---
layout: default
---
<div class="container post">
    <div class="col s10">
        <div class="row" style="padding:10px;">
            <a id="home" class="waves-effect waves-light btn white-text darken-2 grey z-depth-4"
               href="{{site.baseurl}}/#blog"><i class="material-icons">arrow_back</i></a>
        </div>
        <h3 class="post-title" itemprop="name headline" style="text-align:center">Tag: {{ page.tag }}</h3>

        <p class="post-meta">
        </p>

        <div class="post-content" itemprop="articleBody">
            <ul>
                {% for post in site.tags[page.tag] %}
                <li><a href="{{ post.url }}">{{ post.title }}</a> - {{ post.date | date_to_string }}<br>
                    {{ post.description }}
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</div>

<div class="row">
  {% for post in site.posts limit: 5 %}
  <div class="col s12 m12">
    <div class="card">
      <div class="card-title center">
        <!--<img src="{{post.image}}">-->
        <span class="card-title">{{ post.title | escape }}</span>
        <a id="{{post.url}}" class="btn-floating halfway-fab waves-effect waves-light red" href="{{ post.url | relative_url }}"><i class="material-icons">more_horiz</i></a>
      </div>
      {% if post.tags %}
      <div style="margin-left:16px;margin-top:16px;min-height:32px">
      <span class="post-tags">
        {% for tag in post.tags %}
        {% capture tag_name %}{{ tag }}{% endcapture %}
          <a class="no-underline" href="/tags/{{ tag_name  | replace: ' ', '-' | downcase }}">
            <span class="chip waves-effect waves-teal">
              <code class="highligher-rouge"><nobr>{{ tag_name}}</nobr></code>
            </span>
          </a>
          <!--<a class="no-underline" href="/tags/{{ tag_name  | replace: ' ', '+' }}"><code class="highligher-rouge"><nobr>{{ tag_name}}</nobr></code></a>{% unless forloop.last %},{% endunless %}-->
        {% endfor %}
      </span>
      </div>
      {% endif %}
      <div class="card-content post">
        <div>{{ post.excerpt }}</div>
      </div>
    </div>
  </div>
  {% endfor %}
</div>

<div class="row">
  {% for post in site.posts %}

  <div class="col s12 m12">
    <div class="card">
      <div class="card-title center">
        <!--<img src="{{post.image}}">-->
        <span class="card-title">{{ post.title | escape }}</span>
        <a id="{{post.url}}" class="btn-floating halfway-fab waves-effect waves-light red" href="{{ post.url | relative_url }}"><i class="material-icons">more_horiz</i></a>
      </div>
      <div class="card-content post">
        <p>{{ post.content |truncatehtml | truncatewords: 60 }}</p>
      </div>
    </div>
  </div>
  {% endfor %}
</div>

{% if site.tag_manager_id and jekyll.environment == 'production' %}
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id={{site.tag_manager_id}}"
                  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
{% endif %}


<div id="cookies" style="display:{{site.cookies_banner}}">
    <p style="text-align:left; padding-left:8px"><a value="hide/show" id="check"
                                                    class="waves-effect waves-light green lighten-1 btn btn-floating pulse"
                                                    onclick="Materialize.toast('{{site.cookie_accept_message}}', 2000)"><i
            class="material-icons">check</i></a></p>
        {% include cookies.html %}
</div>
